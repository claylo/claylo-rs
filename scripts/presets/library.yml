# Library preset feature flags (project-specific values like project_name
# and crate_name are set by the wrapper script, not in preset files)
preset: library
lint_level: strict
hook_system: none
has_cli: false
has_core_library: true
has_config: false
has_jsonl_logging: false
has_opentelemetry: false
has_mcp_server: false
has_benchmarks: true
has_site: false
site_deploy: github_pages
site_package_manager: npm
has_community_files: false
# Dotfiles (library = off)
has_yamlfmt: false
has_yamllint: false
has_editorconfig: false
has_env_files: false
# Core files
has_agents_md: true
has_gitattributes: true
# GitHub
has_github: true
has_security_md: true
has_issue_templates: true
has_pr_templates: true
# Markdown
has_md: true
has_md_strict: false
# Claude
has_claude: true
# Release automation (library = releases but no binary dist)
has_releases: true
has_attestations: false
# Repository tooling
has_coda: true
has_roadmap_votes: false
