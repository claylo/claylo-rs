# Continuous Deployment workflow for claylo-rs template
# Generates changelog and updates Homebrew formula on tag push

name: CD

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  PROJECT_NAME: claylo-rs

jobs:
  generate-changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          echo "version=${version}" >> $GITHUB_OUTPUT
          # Check if this is a prerelease (contains hyphen like -alpha, -beta, -rc)
          if [[ "$version" == *-* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        id: git-cliff
        with:
          config: cliff.toml
          args: -vv --latest --no-exec --github-repo ${{ github.repository }}

  create-release:
    name: Create GitHub Release
    needs: generate-changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Stamp version in wrapper
        run: |
          sed -i 's/^VERSION="devel"/VERSION="${{ needs.generate-changelog.outputs.version }}"/' bin/claylo-rs

      - name: Create release
        if: needs.generate-changelog.outputs.is_prerelease == 'false'
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.7.0
        with:
          name: "Release v${{ needs.generate-changelog.outputs.version }}"
          body: "${{ needs.generate-changelog.outputs.release_body }}"
          files: bin/claylo-rs
          draft: false
          prerelease: false

      - name: Create pre-release
        if: needs.generate-changelog.outputs.is_prerelease == 'true'
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.7.0
        with:
          name: "Pre-release v${{ needs.generate-changelog.outputs.version }}"
          body: "${{ needs.generate-changelog.outputs.release_body }}"
          files: bin/claylo-rs
          draft: false
          prerelease: true

  publish-homebrew:
    name: Publish Homebrew formula
    # Only publish to Homebrew for stable releases, not prereleases
    if: needs.generate-changelog.outputs.is_prerelease == 'false'
    needs: [generate-changelog, create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Bump formula
        uses: mislav/bump-homebrew-formula-action@ccf2332299a883f6af50a1d2d41e5df7904dd769 # v4.1
        with:
          formula-name: ${{ env.PROJECT_NAME }}
          homebrew-tap: claylo/homebrew-brew
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_COMMITTER_TOKEN }}
